<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BABYLONIA GLOW - NAVE CENTRAL URBANA</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    /* RESET EXTENDED URBAN LAB: PROHIBIDO EL SCROLL EN EL CELULAR */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #0f0f0e;
      font-family: 'Courier Prime', monospace;
    }

    /* CHASIS CONTENEDOR AJUSTADO AL ALTO DISPONIBLE (CERO DERROCHE DE ESPACIO) */
    .urban-lab-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: radial-gradient(circle at 50% 50%, rgba(40, 40, 38, 0.85), rgba(15, 15, 14, 1)),
                  repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
      color: #e2e8f0;
      position: relative;
    }

    /* CABECERA CON ILUMINACIÓN RADIAL VERDE NEÓN */
    .header-tactico {
      text-align: center;
      margin-bottom: 4px;
    }
    .logo-babylonia {
      font-size: 2.2rem;
      color: #4ade80;
      font-weight: 900;
      letter-spacing: -1px;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.6), 0 0 2px #000;
      text-transform: uppercase;
    }
    .subtitulo-militar {
      font-size: 0.65rem;
      color: #8a8a8a;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* CONSOLA DE FUSIBLES: SWITCH ANALÓGICO */
    .consola-fusibles {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }
    .placa-metalica {
      background: #242422;
      padding: 6px 16px;
      border: 2px solid #3f3f3e;
      box-shadow: inset 0px 0px 8px rgba(0, 0, 0, 0.9), 3px 3px 0px rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .label-tactico {
      font-size: 0.85rem;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    .neon-activo {
      color: #4ade80;
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.7);
    }
    .texto-gastado {
      color: #4a4a49;
    }
    
    /* PALANCA DE CUCHILLA CSS INDUSTRIAL */
    .switch-analogo {
      position: relative;
      display: inline-block;
      width: 55px;
      height: 26px;
      cursor: pointer;
    }
    .switch-analogo input { opacity: 0; width: 0; height: 0; }
    .palanca-cuchilla {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #171715;
      border: 2px solid #3b3b3a;
      border-radius: 26px;
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
      transition: 0.3s;
    }
    .palanca-cuchilla:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: #4f4f4e;
      border: 1px solid #6b6b6a;
      border-radius: 50%;
      transition: 0.3s;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    }
    .switch-analogo input:checked + .palanca-cuchilla {
      background-color: #213b28;
      border-color: #4ade80;
    }
    .switch-analogo input:checked + .palanca-cuchilla:before {
      transform: translateX(29px);
      background-color: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    /* MONITOR SUPERIOR TIPO CARTEL DE CARTÓN */
    .monitor-central {
      background: #cdaf79;
      color: #21190e;
      margin: 0 auto 10px auto;
      padding: 6px 12px;
      font-weight: bold;
      font-size: 0.8rem;
      text-align: center;
      width: 92%;
      box-shadow: 3px 3px 0px rgba(0,0,0,0.4);
      transform: rotate(-0.5deg);
    }

    /* GRID ESTÁTICO EN REJILLA MATRIX (2X2 ABIERTO) */
    .grid-botones-tacticos {
      flex-grow: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding-bottom: 8px;
    }

    /* ARQUITECTURA CRÍTICA: LAS CAJAS DE LA IMAGEN NORTE SON BOTONES REALES */
    .boton-nave {
      border: none;
      text-align: left;
      padding: 12px;
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      outline: none;
    }
    .boton-nave:active {
      transform: scale(0.97) !important;
      filter: brightness(0.9);
    }

    /* TEXTURAS DE LOS SUMINISTROS (CARTÓN ROTADO Y CHAPA) */
    .tipo-carton {
      background: #cdaf79;
      color: #21190e;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
      border-left: 2px solid #b59663;
      border-bottom: 2px solid #9c7f52;
    }
    .carton-angulo-1 { transform: rotate(-1.5deg); }
    .carton-angulo-2 { transform: rotate(1.2deg); }
    .carton-angulo-3 { transform: rotate(-0.8deg); }

    .tipo-chapa {
      background: linear-gradient(135deg, #3d291f, #21140e);
      border: 2px solid #4f392d;
      color: #ebd0c2;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.7), 4px 4px 8px rgba(0,0,0,0.5);
    }

    /* PARCHES DE CINTA DE EMBALAR INDUSTRIAL */
    .cinta-adhesiva {
      position: absolute;
      width: 50px;
      height: 16px;
      background: rgba(212, 175, 118, 0.4);
      backdrop-filter: blur(0.5px);
    }
    .top-left { top: -6px; left: -10px; transform: rotate(-12deg); }
    .top-right { top: -6px; right: -10px; transform: rotate(15deg); }

    /* REMACHES DE ACERO PARA LA CHAPA OXIDADA */
    .remache {
      position: absolute;
      width: 5px;
      height: 5px;
      background: #120b08;
      border-radius: 50%;
    }
    .tl { top: 4px; left: 4px; } .tr { top: 4px; right: 4px; }
    .bl { bottom: 4px; left: 4px; } .br { bottom: 4px; right: 4px; }

    /* CONTENIDO INTERNO DE LOS BOTONES */
    .prod-titulo { font-size: 0.95rem; font-weight: bold; text-transform: uppercase; line-height: 1.1; }
    .prod-precio { font-size: 1.2rem; font-weight: bold; color: #1e6b36; margin-top: 2px; }
    .tipo-chapa .prod-precio { color: #4ade80; }

    .meta-data { font-size: 0.65rem; line-height: 1.2; margin-top: auto; opacity: 0.9; }
    
    /* BADGES DE SEÑALIZACIÓN DE STOCK */
    .status-badge { display: inline-block; font-size: 0.65rem; font-weight: bold; padding: 2px 5px; margin-top: 4px; text-transform: uppercase; }
    .status-badge.rojo { color: #ef4444; border: 1px solid #ef4444; text-shadow: 0 0 4px rgba(239, 68, 68, 0.4); }
    .status-badge.verde { color: #166534; border: 1px solid #166534; }
    .tipo-chapa .status-badge.verde { color: #4ade80; border: 1px solid #4ade80; }

    /* PANEL INFERIOR FIJO: CAJONES DE MADERA Y ACCESOS */
    .panel-infraestructura { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px; height: 55px; }
    .cajon-militar, .cajon-tapa, .cajon-arpillera { border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4px; font-size: 0.68rem; font-weight: bold; text-transform: uppercase; }
    .cajon-militar { background: rgba(0,0,0,0.5); border: 1px solid #4ade80; color: #4ade80; }
    .cajon-tapa { background: #544333; border: 2px double #362a1f; color: #d1bba7; }
    .cajon-arpillera { background: #7a654d; border: 1px dashed #47392b; color: #1f170f; }
    
    /* BLOQUES DE ESTADO OPERATIVO */
    .estado-pantalla { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f0f0e; color: #4ade80; font-size: 1.2rem; text-shadow: 0 0 8px #4ade80; gap: 15px; }
    .error-badge { color: #ef4444; border: 1px dashed #ef4444; padding: 10px; font-size: 0.85rem; max-width: 80%; text-align: center; }
    .oculto { display: none !important; }
  </style>
</head>
<body>

  <div id="loader-reactor" class="estado-pantalla">
    <span>SINCRO_REACTOR_SUPABASE...</span>
  </div>

  <div id="wrapper-nave" class="urban-lab-wrapper oculto">
    
    <header class="header-tactico">
      <h1 class="logo-babylonia">BABYLONIA GLOW</h1>
      <p class="subtitulo-militar">LABORATORIO URBANO & PROVISIONES DE BARRIO - RÍO GRANDE</p>
    </header>

    <section class="consola-fusibles">
      <div class="placa-metalica">
        <span id="label-indoor" class="label-tactico neon-activo">CULTIVO INDOOR</span>
        <label class="switch-analogo">
          <input type="checkbox" id="switch-sector-input">
          <span class="palanca-cuchilla"></span>
        </label>
        <span id="label-smoke" class="label-tactico texto-gastado">SMOKE SHOP</span>
      </div>
    </section>

    <div class="monitor-central">
      <span>[STOCK MOSTRADOR - SUMINISTROS EN TIEMPO REAL]</span>
    </div>

    <main id="contenedor-productos" class="grid-botones-tacticos">
      </main>

    <footer class="panel-infraestructura">
      <button class="cajon-militar" onclick="alert('SISTEMA INTEGRADO NEXO ARQUETIPO OPERATIVO')">
        [SISTEMA NEXO BABYLONIA]
      </button>
      <button class="cajon-tapa" onclick="alert('ACCESO A KITS DE GERMINACIÓN REGIONALES')">
        KIT GERMINACIÓN TDF
      </button>
      <button class="cajon-arpillera" onClick="alert('MÓDULO DE SUSTRATO SELECCIONADO')">
        SUSTRATO PREM.
      </button>
    </footer>

    <audio id="ambientAudio" loop muted src="assets/audio/nexo_nave_ambient.mp3"></audio>
  </div>

  <script>
    // ============================================================================
    // ⚙️ ENLACE DE CREDENCIALES: INYECTÁ ACÁ TUS DATOS DE SUPABASE
    // ============================================================================
    const SUPABASE_URL = "TU_SUPABASE_URL_AQUÍ"; 
    const SUPABASE_ANON_KEY = "TU_SUPABASE_ANON_KEY_AQUÍ";

    // Inicialización del cliente global nativo
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // selectores del DOM
    const loader = document.getElementById('loader-reactor');
    const wrapper = document.getElementById('wrapper-nave');
    const contenedorProductos = document.getElementById('contenedor-productos');
    const switchSector = document.getElementById('switch-sector-input');
    const labelIndoor = document.getElementById('label-indoor');
    const labelSmoke = document.getElementById('label-smoke');
    const audioNode = document.getElementById('ambientAudio');

    let sectorActual = 'cultivo_indoor';

    // ⚡ CONSULTA DIRECTA Y SÍNCRONA DE DATOS
    async function cargarNave() {
      try {
        loader.classList.remove('oculto');
        wrapper.classList.add('oculto');

        // Petición limpia a tu tabla sin desvíos raros
        const { data, error } = await supabaseClient
          .from('productos_babylonia')
          .select('id, titulo, precio, sku, stock_estado, origen, textura, tipo_visual')
          .eq('sector', sectorActual);

        if (error) throw error;

        // Limpiar el contenedor antes de inyectar los botones
        contenedorProductos.innerHTML = '';

        if (data && data.length > 0) {
          data.forEach((prod, index) => {
            const boton = document.createElement('button');
            
            // Determinamos si es chapa o cartón (Sayri fuerza chapa según el plano)
            const tipoVisual = prod.tipo_visual || (index === 1 ? 'chapa' : 'carton');
            const anguloClase = `carton-angulo-${(index % 3) + 1}`;
            
            boton.className = `boton-nave ${tipoVisual === 'chapa' ? 'tipo-chapa' : `tipo-carton ${anguloClase}`}`;
            
            // Configurar la acción táctil de envío directa
            boton.onclick = () => {
              console.log(`Operación comercial iniciada para: ${prod.id}`);
              const textoMensaje = `Hola Babylonia Glow, me interesa el producto: ${prod.titulo} (SKU: ${prod.sku})`;
              window.open(`https://wa.me/5492964XXXXXX?text=${encodeURIComponent(textoMensaje)}`, '_blank');
            };

            // Inyección interna de componentes visuales (Cintas para cartón, remaches para chapa)
            let adornosHTML = '';
            if (tipoVisual === 'carton') {
              const cintaLugar = index === 2 ? 'top-right' : 'top-left';
              adornosHTML = `<div class="cinta-adhesiva ${cintaLugar}"></div>`;
            } else if (tipoVisual === 'chapa') {
              adornosHTML = `
                <div class="remache tl"></div><div class="remache tr"></div>
                <div class="remache bl"></div><div class="remache br"></div>
              `;
            }

            const badgeColor = prod.stock_estado === 'BAJO STOCK' ? 'rojo' : 'verde';

            boton.innerHTML = `
              ${adornosHTML}
              <div class="prod-titulo">${prod.titulo}</div>
              <div class="prod-precio">$${prod.precio}</div>
              <div class="meta-data">
                <span class="status-badge ${badgeColor}">${prod.stock_estado}</span>
                <br>
                ORIGEN: ${prod.origen} / TEXTURA: ${prod.textura}
              </div>
            `;

            contenedorProductos.appendChild(boton);
          });
        } else {
          // Contingencia si la tabla devuelve un array vacío
          contenedorProductos.innerHTML = `<div style="grid-column: span 2; text-align:center; padding:20px; color:#ef4444;">[ALERTA: VACÍO DE SUMINISTROS EN ESTE SECTOR]</div>`;
        }

        // Mostrar interfaz unificada
        loader.classList.add('oculto');
        wrapper.classList.remove('oculto');

      } catch (err) {
        console.error(err);
        loader.innerHTML = `
          <span>[FALLO EN ENLACE SUPABASE]</span>
          <div class="error-badge">LOG: ${err.message || 'Error de Red local'}</div>
          <button style="background: #222; color: #4ade80; padding: 8px; border: 1px solid #4ade80; margin-top:15px; cursor: pointer;" onclick="cargarNave()">REINTENTAR ENLACE</button>
        `;
      }
    }

    // INTERRUPTOR DE PALANCA: EVENTO DE CAMBIO DE ENTORNO
    switchSector.addEventListener('change', (e) => {
      if (e.target.checked) {
        sectorActual = 'smoke_shop';
        labelIndoor.className = 'label-tactico texto-gastado';
        labelSmoke.className = 'label-tactico neon-activo';
      } else {
        sectorActual = 'cultivo_indoor';
        labelIndoor.className = 'label-tactico neon-activo';
        labelSmoke.className = 'label-tactico texto-gastado';
      }
      cargarNave();
    });

    // CUMPLIMIENTO NATIVO MULTIMEDIA AL ARRANQUE
    window.addEventListener('DOMContentLoaded', () => {
      if (audioNode) audioNode.muted = true;
      cargarNave();
    });
  </script>
</body>
</html>
