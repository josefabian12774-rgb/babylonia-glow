<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BABYLONIA GLOW - PROTOCOLO E.U.L.</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    /* ============================================================================
       🎨 DIRECTIVA DE ESTILOS CRÍTICOS: ARQUITECTURA FIJA (SIN SCROLL)
       ============================================================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #0f0f0e;
      font-family: 'Courier Prime', monospace;
    }

    /* CHASIS CONTENEDOR CENTRAL: ABARCA EL 100% DE LA PANTALLA DEL CELULAR */
    .urban-lab-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: radial-gradient(circle at 50% 50%, rgba(35, 35, 33, 0.9), rgba(12, 12, 11, 1)),
                  repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
      color: #e2e8f0;
      position: relative;
    }

    /* HEADER TÁCTICO INTEGRADO */
    .header-tactico {
      text-align: center;
      margin-bottom: 2px;
    }
    .logo-babylonia {
      font-size: 2rem;
      color: #4ade80;
      font-weight: 900;
      letter-spacing: -1px;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.6), 0 0 2px #000;
      text-transform: uppercase;
    }
    .subtitulo-militar {
      font-size: 0.6rem;
      color: #a3a3a3;
      letter-spacing: 1px;
      margin-top: 1px;
    }

    /* CONSOLA DE FUSIBLES (SWITCHES SUPERIORES) */
    .consola-fusibles {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }
    .placa-metalica {
      background: #242422;
      padding: 6px 14px;
      border: 2px solid #3f3f3e;
      box-shadow: inset 0px 0px 8px rgba(0, 0, 0, 0.9), 3px 3px 0px rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .label-tactico {
      font-size: 0.75rem;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    .neon-activo {
      color: #4ade80;
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.7);
    }
    .texto-gastado {
      color: #4a4a49;
    }
    
    /* CONTROL SWITCH ANALÓGICO */
    .switch-analogo {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 22px;
      cursor: pointer;
    }
    .switch-analogo input { opacity: 0; width: 0; height: 0; }
    .palanca-cuchilla {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #171715;
      border: 2px solid #3b3b3a;
      border-radius: 22px;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.8);
      transition: 0.3s;
    }
    .palanca-cuchilla:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: #4f4f4e;
      border: 1px solid #6b6b6a;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch-analogo input:checked + .palanca-cuchilla {
      background-color: #213b28;
      border-color: #4ade80;
    }
    .switch-analogo input:checked + .palanca-cuchilla:before {
      transform: translateX(24px);
      background-color: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }

    /* MONITOR CENTRAL DE STOCK */
    .monitor-central {
      background: rgba(205, 175, 121, 0.15);
      border: 1px dashed rgba(74, 222, 128, 0.4);
      color: #4ade80;
      padding: 4px;
      font-weight: bold;
      font-size: 0.7rem;
      text-align: center;
      width: 100%;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    /* SECTOR DE ACCESO / MENÚ CRÍTICO CONSOLIDADO */
    .menu-tactico-horizontal {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 8px;
      width: 100%;
    }
    .btn-link-menu {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #3f3f3e;
      color: #a3a3a3;
      padding: 5px 2px;
      font-size: 0.58rem;
      text-transform: uppercase;
      cursor: pointer;
      flex-grow: 1;
      text-align: center;
      font-weight: bold;
    }
    .btn-link-menu:active {
      border-color: #4ade80;
      color: #4ade80;
    }

    /* MATRIX GRID: RECONSTRUCCIÓN FIJA DE 2 COLUMNAS X 2 FILAS */
    .grid-botones-tacticos {
      flex-grow: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      padding-bottom: 8px;
    }

    /* CAJAS CONVERTIDAS EN ENLACES DE ACCIÓN TÁCTIL DIRECTA */
    .boton-nave {
      border: none;
      text-align: left;
      padding: 10px;
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      outline: none;
    }
    .boton-nave:active {
      transform: scale(0.97) !important;
      filter: brightness(0.9);
    }

    /* ESTÉTICA PARCHE DE CARTÓN ASIMÉTRICO (IMAGEN NORTE) */
    .tipo-carton {
      background: #cdaf79;
      color: #21190e;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
      border-left: 2px solid #b59663;
      border-bottom: 2px solid #9c7f52;
    }
    .carton-angulo-1 { transform: rotate(-1deg); }
    .carton-angulo-2 { transform: rotate(1deg); }
    .carton-angulo-3 { transform: rotate(-0.5deg); }

    /* ESTÉTICA BLOQUE DE CHAPA OXIDADA INDUSTRIAL */
    .tipo-chapa {
      background: linear-gradient(135deg, #422d22, #261710);
      border: 2px solid #543d31;
      color: #ebd0c2;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.7), 4px 4px 8px rgba(0,0,0,0.5);
    }

    /* PARCHES DE CINTA ADHESIVA INDUSTRIAL */
    .cinta-adhesiva {
      position: absolute;
      width: 45px;
      height: 14px;
      background: rgba(212, 175, 118, 0.45);
      backdrop-filter: blur(0.5px);
    }
    .top-left { top: -5px; left: -8px; transform: rotate(-12deg); }
    .top-right { top: -5px; right: -8px; transform: rotate(15deg); }

    /* REMACHES METÁLICOS */
    .remache {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #120b08;
      border-radius: 50%;
    }
    .tl { top: 4px; left: 4px; } .tr { top: 4px; right: 4px; }
    .bl { bottom: 4px; left: 4px; } .br { bottom: 4px; right: 4px; }

    /* METADATOS INTERNOS DEL SUMINISTRO */
    .prod-titulo { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; line-height: 1.1; }
    .prod-precio { font-size: 1.1rem; font-weight: bold; color: #1e6b36; margin-top: 1px; }
    .tipo-chapa .prod-precio { color: #4ade80; }

    .meta-data { font-size: 0.6rem; line-height: 1.2; margin-top: auto; opacity: 0.95; }
    
    /* CONTENEDORES INTERNOS DE SEÑALES (BADGES) */
    .status-badge { display: inline-block; font-size: 0.58rem; font-weight: bold; padding: 1px 4px; margin-top: 2px; text-transform: uppercase; }
    .status-badge.rojo { color: #ef4444; border: 1px solid #ef4444; text-shadow: 0 0 4px rgba(239, 68, 68, 0.4); }
    .status-badge.verde { color: #166534; border: 1px solid #166534; }
    .tipo-chapa .status-badge.verde { color: #4ade80; border: 1px solid #4ade80; }

    /* INFRAESTRUCTURA DE CONTROL INFERIOR FIJA */
    .panel-infraestructura {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 6px;
      height: 48px;
    }
    .cajon-militar, .cajon-tapa, .cajon-arpillera {
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      font-size: 0.62rem;
      font-weight: bold;
      text-transform: uppercase;
    }
    .cajon-militar { background: rgba(0,0,0,0.5); border: 1px solid #4ade80; color: #4ade80; font-size: 0.58rem; }
    .cajon-tapa { background: #544333; border: 2px double #362a1f; color: #d1bba7; }
    .cajon-arpillera { background: #7a654d; border: 1px dashed #47392b; color: #1f170f; }
    
    /* ENTORNO LOGÍSTICO Y CAPA DE BLOQUEO */
    .estado-pantalla { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f0f0e; color: #4ade80; font-size: 1.1rem; text-shadow: 0 0 8px #4ade80; gap: 12px; }
    .error-badge { color: #ef4444; border: 1px dashed #ef4444; padding: 8px; font-size: 0.75rem; max-width: 85%; text-align: center; }
    .oculto { display: none !important; }
  </style>
</head>
<body>

  <div id="loader-reactor" class="estado-pantalla">
    <span>SINCRO_REACTOR_SUPABASE...</span>
  </div>

  <div id="wrapper-nave" class="urban-lab-wrapper oculto">
    
    <header class="header-tactico">
      <h1 class="logo-babylonia">BABYLONIA GLOW</h1>
      <p class="subtitulo-militar">LABORATORIO URBANO & PROVISIONES DE BARRIO - RÍO GRANDE</p>
    </header>

    <nav class="menu-tactico-horizontal">
      <button class="btn-link-menu" onclick="alert('MÓDULO: LABORATORIO CULTIVO')">LAB. CULTIVO</button>
      <button class="btn-link-menu" onclick="alert('MÓDULO: PARAFERNALIA DIARIA')">PARAFERNALIA</button>
      <button class="btn-link-menu" onclick="alert('MÓDULO: KITS TÁCTICOS')">KITS TDF</button>
      <button class="btn-link-menu" onclick="alert('MÓDULO: GEOLOCALIZACIÓN ENTREGA')">ENTREGAS</button>
    </nav>

    <section class="consola-fusibles">
      <div class="placa-metalica">
        <span id="label-indoor" class="label-tactico neon-activo">CULTIVO INDOOR</span>
        <label class="switch-analogo">
          <input type="checkbox" id="switch-sector-input">
          <span class="palanca-cuchilla"></span>
        </label>
        <span id="label-smoke" class="label-tactico texto-gastado">SMOKE SHOP</span>
      </div>
    </section>

    <div class="monitor-central">
      <span>[STOCK MOSTRADOR - TIEMPO REAL]</span>
    </div>

    <main id="contenedor-productos" class="grid-botones-tacticos">
      </main>

    <footer class="panel-infraestructura">
      <button class="cajon-militar" onclick="alert('[SISTEMA CENTRAL NEXO ARQUETIPO OPERATIVO]')">
        [SISTEMA NEXO BABYLONIA - ESTABLE]
      </button>
      <button class="cajon-tapa" onclick="alert('ABRIENDO RESERVA: KIT DE GERMINACIÓN TDF')">
        KIT GERMINACIÓN TDF
      </button>
      <button class="cajon-arpillera" onClick="alert('ABRIENDO RESERVA: SUSTRATO PREM.')">
        SUSTRATO PREM.
      </button>
    </footer>

    <audio id="ambientAudio" loop muted src="assets/audio/nexo_nave_ambient.mp3"></audio>
  </div>

  <script>
    // ============================================================================
    // ⚙️ CONEXIÓN CRÍTICA DE DATOS: COLOCÁ TUS LLAVES REALES ACÁ ABAJO
    // ============================================================================
    const SUPABASE_URL = "TU_SUPABASE_URL_AQUÍ"; 
    const SUPABASE_ANON_KEY = "TU_SUPABASE_ANON_KEY_AQUÍ";

    // Enlace nativo con el CDN de Supabase
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Mapeo de nodos del DOM
    const loader = document.getElementById('loader-reactor');
    const wrapper = document.getElementById('wrapper-nave');
    const contenedorProductos = document.getElementById('contenedor-productos');
    const switchSector = document.getElementById('switch-sector-input');
    const labelIndoor = document.getElementById('label-indoor');
    const labelSmoke = document.getElementById('label-smoke');
    const audioNode = document.getElementById('ambientAudio');

    let sectorActual = 'cultivo_indoor';

    // EXTRACTOR CINÉTICO DE DATOS
    async function ejecutarSincronizacion() {
      try {
        loader.classList.remove('oculto');
        wrapper.classList.add('oculto');

        // Petición limpia filtrada por sector de negocio independiente
        const { data, error } = await supabaseClient
          .from('productos_babylonia')
          .select('id, titulo, precio, sku, stock_estado, origen, textura, tipo_visual')
          .eq('sector', sectorActual);

        if (error) throw error;

        // Limpieza de buffer visual
        contenedorProductos.innerHTML = '';

        if (data && data.length > 0) {
          data.forEach((prod, index) => {
            const boton = document.createElement('button');
            
            // Forzado estético: el segundo ítem (Sayri) asume textura chapa, el resto cartón asimétrico
            const tipoVisual = prod.tipo_visual || (index === 1 ? 'chapa' : 'carton');
            const anguloClase = `carton-angulo-${(index % 3) + 1}`;
            
            boton.className = `boton-nave ${tipoVisual === 'chapa' ? 'tipo-chapa' : `tipo-carton ${anguloClase}`}`;
            
            // Disparador de interacción nativa (Checkout de Nexo Arquetipo)
            boton.onclick = () => {
              console.log(`Enlace logístico activado en Río Grande para ID: ${prod.id}`);
              const msj = `Hola Babylonia Glow, me interesa el suministro: ${prod.titulo} (SKU: ${prod.sku})`;
              window.open(`https://wa.me/5492964XXXXXX?text=${encodeURIComponent(msj)}`, '_blank');
            };

            // Inyección de apliques superficiales según textura (Cintas o pernos)
            let apliquesHTML = '';
            if (tipoVisual === 'carton') {
              const orientacionCinta = index === 2 ? 'top-right' : 'top-left';
              apliquesHTML = `<div class="cinta-adhesiva ${orientacionCinta}"></div>`;
            } else if (tipoVisual === 'chapa') {
              apliquesHTML = `
                <div class="remache tl"></div><div class="remache tr"></div>
                <div class="remache bl"></div><div class="remache br"></div>
              `;
            }

            const badgeClase = prod.stock_estado === 'BAJO STOCK' ? 'rojo' : 'verde';

            boton.innerHTML = `
              ${apliquesHTML}
              <div class="prod-titulo">${prod.titulo}</div>
              <div class="prod-precio">$${prod.precio}</div>
              <div class="meta-data">
                <span class="status-badge ${badgeClase}">${prod.stock_estado}</span>
                <br>
                ORIGEN: ${prod.origen} / TEXTURA: ${prod.textura}
              </div>
            `;

            contenedorProductos.appendChild(boton);
          });
        } else {
          contenedorProductos.innerHTML = `<div style="grid-column: span 2; text-align:center; padding-top:30px; color:#ef4444; font-size:0.8rem;">[FALLO: ENTORNO SIN REGISTROS DE STOCK]</div>`;
        }

        loader.classList.add('oculto');
        wrapper.classList.remove('oculto');

      } catch (err) {
        console.error(err);
        loader.innerHTML = `
          <span>[FALLO DE CONEXIÓN]</span>
          <div class="error-badge">LOG: ${err.message || 'Error de enlace del servidor local'}</div>
          <button style="background: #222; color: #4ade80; padding: 8px; border: 1px solid #4ade80; margin-top:15px; cursor: pointer; font-family:monospace;" onclick="ejecutarSincronizacion()">REINTENTAR SINCRO</button>
        `;
      }
    }

    // LISTENER ANALÓGICO PARA EL INTERRUPTOR DE PALANCA
    switchSector.addEventListener('change', (e) => {
      if (e.target.checked) {
        sectorActual = 'smoke_shop';
        labelIndoor.className = 'label-tactico texto-gastado';
        labelSmoke.className = 'label-tactico neon-activo';
      } else {
        sectorActual = 'cultivo_indoor';
        labelIndoor.className = 'label-tactico neon-activo';
        labelSmoke.className = 'label-tactico texto-gastado';
      }
      ejecutarSincronizacion();
    });

    // ARRANQUE NATIVO DE INFRAESTRUCTURA MULTIMEDIA
    window.addEventListener('DOMContentLoaded', () => {
      if (audioNode) audioNode.muted = true;
      ejecutarSincronizacion();
    });
  </script>
</body>
</html>
