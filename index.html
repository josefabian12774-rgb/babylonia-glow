<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BABYLONIA GLOW - CORE UI</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --neon: #4ade80; --cardboard: #cdaf79; --metal: #242422; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Courier Prime', monospace; background: #1a1a1a; }

        /* Contenedor Base - Cemento Industrial */
        .bunker-root {
            height: 100vh; width: 100vw;
            background: #2a2a2a; /* Textura base */
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 10px;
            gap: 10px;
        }

        /* Botón Reactivo Industrial */
        .btn-industrial {
            background: var(--cardboard);
            border: 2px solid #555;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 5px; text-align: center; font-size: 10px; text-transform: uppercase;
        }
        .btn-industrial:active { transform: scale(0.95); box-shadow: inset 5px 5px 10px rgba(0,0,0,0.5); }

        /* Grilla del Arsenal - Sin Scroll */
        .grid-arsenal {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        /* Estética de Chapa/Cartón */
        .card-chapa { background: var(--metal); border: 2px solid #444; color: #fff; }
        
        .header-ui { color: var(--neon); text-align: center; font-size: 20px; text-shadow: 0 0 5px var(--neon); }
        .footer-ui { display: flex; justify-content: space-between; align-items: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="app" class="bunker-root">
    <header class="header-ui">BABYLONIA GLOW</header>

    <main class="grid-arsenal">
        <button class="btn-industrial" @click="accion('PAPELILLOS')">PAPELILLOS G-ROLLZ</button>
        <button class="btn-industrial card-chapa" @click="accion('TABACO')">TABACO SAYRI</button>
        <button class="btn-industrial" @click="accion('FILTROS')">FILTROS RAW</button>
        <button class="btn-industrial" @click="accion('CLIPPER')">ENCENDEDOR CLIPPER</button>
        
        <button class="btn-industrial card-chapa" @click="accion('PICADOR')">PICADOR TÁCTICO</button>
        <button class="btn-industrial" @click="accion('GERMINACION')">KIT GERMINACIÓN</button>
        <button class="btn-industrial" @click="accion('SUSTRATO')">SUSTRATO PREM.</button>
        <button class="btn-industrial card-chapa" @click="accion('KIT_INDOOR')">KIT INDOOR</button>
    </main>

    <footer class="footer-ui">
        <div @click="accion('STATUS')">[SISTEMA ESTABLE]</div>
        <div @click="accion('WHATSAPP')">⚡ REPORTE</div>
    </footer>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const accion = (tipo) => {
                console.log('Interacción física detectada:', tipo);
                // Aquí podés disparar las funciones síncronas de la nave
            };
            return { accion };
        }
    }).mount('#app');
</script>
</body>
</html>
